        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Cria uma nova aplicação
      tags: [Aplicações]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                  example: Retech Fin Admin
                code:
                  type: string
                  example: retech-fin-admin
                description:
                  type: string
                  example: Sistema de controle de acesso
      responses:
