          type: string
          format: email
        name:
          type: string
        active:
          type: boolean
        version:
          type: integer
          description: Versão atual do usuário (usado para controle de concorrência)
          example: 6
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    UserItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        active:
          type: boolean
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleDTO"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    GetUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        active:
          type: boolean
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleDTO"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionDTO"
        abilities:
          type: array
          items:
            $ref: "#/components/schemas/AbilityDTO"
        version:
          type: integer
          description: Versão atual do usuário (usado para controle de concorrência)
          example: 5
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    # ==================== APPLICATION SCHEMAS ====================
    ApplicationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        description:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    # ==================== ROLE SCHEMAS ====================
    RoleItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        description:
          type: string
        system:
          type: boolean
          description: "true = role base do sistema (não editável), false = role customizada"
        active:
          type: boolean
        permission_count:
          type: integer
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionDTO"
          description: "Lista de permissions (incluído apenas quando include_permissions=true)"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    GetRoleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        description:
          type: string
        system:
          type: boolean
          description: "true = role base do sistema (não editável), false = role customizada"
        active:
          type: boolean
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionDTO"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
