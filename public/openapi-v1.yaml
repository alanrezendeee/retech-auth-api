        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /applications/sync:
    post:
      summary: Sincroniza manifest de uma aplicação (permissions e roles base)
      description: |
        Sincroniza o manifest de uma aplicação com o banco de dados de forma **totalmente idempotente**.
        
        **Idempotência:**
        - ✅ Executar o mesmo manifest múltiplas vezes produz o **mesmo estado final**
        - ✅ Pode ser executado após 2 horas, 2 dias ou 2 meses com segurança
        - ✅ Recursos são identificados por chaves únicas (code, email) e atualizados ao invés de duplicados
        
        **Ordem de Processamento:**
        1. Application (upsert por `code`)
        2. Permissions (upsert por `application_id + code`)
        3. Roles (upsert por `application_id + code`)
        4. Role-Permissions (regenerado completamente baseado no manifest)
        5. Users (upsert por `email`, apenas se fornecido no manifest)
        
        **Autenticação:**
        - **JWT (uso normal)**: Use `Authorization: Bearer {token}` quando a aplicação já existe e você tem um usuário autenticado
        - **HMAC (bootstrap)**: Use headers `X-Signature` e `X-Timestamp` com um secret compartilhado para criar aplicações iniciais sem autenticação JWT
          - Requer `BOOTSTRAP_SECRET` configurado no servidor e `RETECHAUTH_BOOTSTRAP_SECRET` no CLI (mesmo valor)
          - A assinatura HMAC valida a integridade do manifest e evita replay attacks (timestamp válido por 5 minutos)
        
        **Application:**
        - Identificada por `code` (único globalmente)
        - Criar: Se não existe → cria nova
        - Atualizar: Se existe → atualiza `name` e `description`, preserva `active`
        
        **Permissions:**
        - Identificadas por `application_id + code` (único por aplicação)
        - Sempre definidas pela aplicação (backend), nunca pelo cliente
        - Só podem ser criadas/atualizadas via sync (não via POST /permissions)
        - Subject automaticamente inclui namespace da aplicação (ex: `admin.users`)
        
        **Roles:**
        - Identificadas por `application_id + code` (único por aplicação)
        - Roles com `system: true` são roles base do sistema (não editáveis via API)
        - Roles customizadas (`system: false`) podem ser criadas via API
        - Role-Permissions são **regenerados completamente** a cada sync (baseado no manifest atual)
        
        **Wildcards:**
        - Suporta wildcards em permissions: qualquer prefixo seguido de `.*` expande para todas as permissions que começam com esse prefixo (ex: `admin.*`, `reports.*`, `core.users.*`)
        
        **Users (se fornecido no manifest):**
        - Identificados por `email` (único globalmente)
        - Criar: Se não existe → cria novo usuário com senha e `tenant_id` (se fornecido) do manifest
        - Atualizar: Se existe → atualiza `name` e `active`, **NÃO atualiza senha nem tenant_id**
        - ⚠️ **Segurança:** Senha e `tenant_id` de usuários existentes **nunca** são atualizados via sync
        - **tenant_id no manifest:**
          - Opcional: Pode ser fornecido para definir a unidade do usuário
          - Uso típico: Primeiro usuário (bootstrap) que precisa ter `tenant_id` definido
          - Se não fornecido: Usuário é criado sem `tenant_id` (usuário global)
        - User-Roles são atualizadas baseadas nos códigos (`code`) fornecidos no manifest
        
        **Tratamento de Erros:**
        - Erros em recursos individuais não interrompem o processamento do sync
        - Sistema continua processando próximo recurso mesmo se um falhar
        
        **Documentação Completa:**
        Veja [docs/business-rules/auth/manifest-sync.md](../docs/business-rules/auth/manifest-sync.md) para regras de negócio detalhadas.
      tags: [Aplicações]
      security:
        - bearerAuth: []
        - hmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application, permissions, roles]
              properties:
                application:
                  type: object
                  required: [code, name]
                  properties:
                    code:
                      type: string
                      example: retech-fin-admin
                      description: "Qualquer identificador único de aplicação (ex: retech-billing, retech-core)"
                    name:
                      type: string
                      example: Retech Fin Admin
                      description: Qualquer nome amigável da aplicação
                    description:
                      type: string
                      example: Painel administrativo Retech Fin
                permissions:
                  type: array
                  items:
                    type: object
                    required: [code]
                    properties:
                      code:
                        type: string
                        example: admin.users.read
                        description: "Qualquer formato de código de permission (ex: billing.orders.create, core.users.manage)"
                      description:
                        type: string
                        example: Listar e visualizar usuários
                      subject:
                        type: string
                        example: Device
                        description: "Recurso alvo (mantido para compatibilidade CASL, opcional)"
                      action:
                        type: string
                        example: read
                        description: "Ação permitida (mantido para compatibilidade CASL, opcional)"
                      conditions:
                        type: string
                        example: '{"userId": "${user.id}"}'
                        description: Condições opcionais em formato JSON
                roles:
                  type: array
                  items:
                    type: object
                    required: [code, name, system, permissions]
                    properties:
                      code:
                        type: string
                        example: RETECH_ADMIN
                        description: "Qualquer código de role (ex: CRV_MANAGER, CORE_USER)"
                      name:
                        type: string
                        example: Administrador Retech
                        description: Qualquer nome amigável da role
                      system:
                        type: boolean
                        example: true
                        description: "true = role base (não editável via API), false = role customizada"
                      description:
                        type: string
                        example: Acesso total ao painel administrativo
                      permissions:
                        type: array
                        items:
                          type: string
                        example: ["admin.*"]
                        description: "Lista de codes de permissions ou wildcards (funciona com qualquer prefixo, ex: [\"reports.*\", \"core.users.*\"])"
      responses:
        "200":
          description: Manifest sincronizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  application:
                    type: object
                    properties:
                      code:
                        type: string
                      action:
                        type: string
                        enum: [created, updated]
                      id:
                        type: string
                        format: uuid
                  permissions:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                        action:
                          type: string
                          enum: [created, updated]
                        id:
                          type: string
                          format: uuid
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                        action:
                          type: string
                          enum: [created, updated]
                        id:
                          type: string
                          format: uuid
                        permissions:
                          type: array
                          items:
                            type: object
                            properties:
                              code:
                                type: string
                              action:
                                type: string
                                enum: [linked]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /applications/{id}:
    get:
      summary: Detalhes de uma aplicação
      tags: [Aplicações]
      security:
