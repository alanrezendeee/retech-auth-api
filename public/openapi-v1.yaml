        action:
          type: string
        description:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    PermissionDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: "Código único da permissão (ex: admin.users.view, Menu:Dashboard)"
          example: "admin.users.view"
        subject:
          type: string
          description: |
            Recurso (namespace + entidade) para CASL.js.
            **Formato:** `{appPrefix}.{resource}` (ex: `admin.users`)
            **Namespacing:** Evita conflitos em sistemas multi-aplicação.
            **Padrão:** Alinhado com AWS IAM, Google Cloud, Azure.
          example: "admin.users"
        action:
          type: string
          description: |
            Ação (verb) para CASL.js.
            **Valores válidos:** `read`, `create`, `update`, `delete`, `manage`, `view`
          example: "view"
        conditions:
          type: string
          nullable: true
        description:
          type: string
    
