services:
  postgres:
    image: postgres:16-alpine
    container_name: retechauth-db
    environment:
      POSTGRES_USER: retechauth
      POSTGRES_PASSWORD: retechauth_dev_password
      POSTGRES_DB: retechauth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retechauth -d retechauth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retechauth-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retechauth-app
    ports:
      - "8080:8080"
    environment:
      PORT: ${PORT:-8080}
      ENV: ${ENV:-development}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-retechauth}
      DB_PASSWORD: ${DB_PASSWORD:-retechauth_dev_password}
      DB_NAME: ${DB_NAME:-retechauth_db}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DOCS_ENABLED: ${DOCS_ENABLED:-true}
      DOCS_SPEC_URL: ${DOCS_SPEC_URL:-/public/openapi.yaml}
      DOCS_TITLE: ${DOCS_TITLE:-Retech Auth API}
      DOCS_DESCRIPTION: ${DOCS_DESCRIPTION:-Documentação dos serviços de autenticação Retech.}
      DOCS_VERSION: ${DOCS_VERSION:-v1 (1.0.0)}
      DOCS_API_BASE_URL: ${DOCS_API_BASE_URL:-http://localhost:8080/v1}
      DOCS_VERSION_LINKS: ${DOCS_VERSION_LINKS:-v1:/docs/v1}
      DOCS_HERO_SUPPORT_EMAIL: ${DOCS_HERO_SUPPORT_EMAIL:-suporte@theretech.com.br}
      DOCS_HERO_SUPPORT_URL: ${DOCS_HERO_SUPPORT_URL:-https://theretech.com.br}
      DOCS_HERO_LICENSE: ${DOCS_HERO_LICENSE:-Proprietary}
      JWT_RSA_KEYS_DIR: ${JWT_RSA_KEYS_DIR:-./keys}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      JWT_REFRESH_EXPIRATION_HOURS: ${JWT_REFRESH_EXPIRATION_HOURS:-168}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - retechauth-network
    volumes:
      - .:/app
    command: ["go", "run", "cmd/api/main.go"]

volumes:
  postgres_data:

networks:
  retechauth-network:
    driver: bridge
